name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: test-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

env:
  POWERSHELL_TELEMETRY_OPTOUT: 1
  DOTNET_CLI_TELEMETRY_OPTOUT: 1

jobs:
  smoke:
    name: smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install PowerShell 7 (ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y wget apt-transport-https software-properties-common
          wget -q https://packages.microsoft.com/config/ubuntu/24.04/packages-microsoft-prod.deb
          sudo dpkg -i packages-microsoft-prod.deb
          sudo apt-get update
          sudo apt-get install -y powershell
          pwsh -NoProfile -Command '$PSVersionTable.PSVersion'
        shell: bash

      - name: Install PowerShell 7 (macos)
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install --cask powershell@preview
        shell: bash

      - name: Show pwsh version
        shell: pwsh
        run: $PSVersionTable | Format-List

      - name: Prepare Claude config dir with effort flag
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $dir = Join-Path $env:RUNNER_TEMP 'claude-test'
          New-Item -ItemType Directory -Force -Path $dir | Out-Null
          'max' | Set-Content -Path (Join-Path $dir '.effort-active') -NoNewline
          "CLAUDE_CONFIG_DIR=$dir" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Run smoke test (default layout, effort badge enabled)
        shell: pwsh
        env:
          SMOKE_EXPECT_EFFORT: 'max'
        run: ./tests/smoke.ps1