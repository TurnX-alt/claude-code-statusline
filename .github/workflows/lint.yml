name: lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same PR; keep completed runs for main.
concurrency:
  group: lint-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

env:
  POWERSHELL_TELEMETRY_OPTOUT: 1
  DOTNET_CLI_TELEMETRY_OPTOUT: 1

jobs:
  psscriptanalyzer:
    name: PSScriptAnalyzer (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install PowerShell 7 (ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y wget apt-transport-https software-properties-common
          wget -q https://packages.microsoft.com/config/ubuntu/24.04/packages-microsoft-prod.deb
          sudo dpkg -i packages-microsoft-prod.deb
          sudo apt-get update
          sudo apt-get install -y powershell
          pwsh -NoProfile -Command '$PSVersionTable.PSVersion'
        shell: bash

      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          Install-Module PSScriptAnalyzer -Force -SkipPublisherCheck -Scope CurrentUser
          Import-Module PSScriptAnalyzer
          Get-Module PSScriptAnalyzer | Format-List Name, Version, Path

      - name: Run PSScriptAnalyzer
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $results = Invoke-ScriptAnalyzer -Path . -Recurse -Severity @('Error','Warning') |
            Sort-Object Severity, RuleName, Line
          $results | Format-Table Severity, RuleName, Line, Column, Message -AutoSize
          $errors = $results | Where-Object Severity -eq 'Error'
          if ($errors) {
            Write-Host "::error::Found $($errors.Count) PSScriptAnalyzer error(s)"
            exit 1
          }
          Write-Host "PSScriptAnalyzer: 0 errors. Warnings are reported but do not fail the build."